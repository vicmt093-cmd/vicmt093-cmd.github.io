

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Oracle Drift Engine</title>

<style>

#history {

    margin-top: 40px;

    border-top: 1px solid #00ff88;

    padding-top: 20px;

}

.oracle-entry {

    margin-bottom: 20px;

    opacity: 0.8;

    cursor: text;

}


</head>

<body>

<div class="container">

    <h1>Oracle Drift Engine</h1>

    <div id="output"></div>

    <div id="history"></div>

</div>
    <script>

let memoryPool = [

    "your future",

    "the signal",

    "forgotten thought",

    "unfinished language",

    "hidden pattern",

    "tomorrow's memory"

];

// What is speaking

const entities = [

    "system",

    "signal",

    "archive",

    "machine",

    "pattern",

    "dream",

    "network",

    "echo"

];

// How it is trying

const adverbs = [

    "quietly",

    "slowly",

    "desperately",

    "carefully",

    "blindly",

    "patiently",

    "secretly",

    "reluctantly"

];

// What it is trying to do

const actions = [

    "remember",

    "translate",

    "reconstruct",

    "predict",

    "recover",

    "witness",

    "decode",

    "summon"

];

// Threshold conditions

const thresholds = [

    "language fully forms",

    "memory settles",

    "the signal stabilizes",

    "meaning arrives",

    "the pattern reveals itself",

    "silence breaks"

];

function random(arr){

    return arr[Math.floor(Math.random() * arr.length)];

}

// recursive memory drift

function recursiveMemory(newMemory){

    memoryPool.push(newMemory);

    if(memoryPool.length > 20){

        memoryPool.shift();

    }

}

function article(word){

    return /^[aeiou]/i.test(word) ? "An" : "A";

}

function generateOracle(){

    const entity = random(entities);

    const adverb = random(adverbs);

    const action = random(actions);

    const memory = random(memoryPool);

    const threshold = random(thresholds);

    // feed memory back into itself

    recursiveMemory(memory);

    return `${article(entity)} ${entity} ${adverb} attempting to ${action} ${memory} before ${threshold}.`;

}

function updateOutput(){

    const oracleText = generateOracle();

    // live current oracle

    document.getElementById("output").innerText = oracleText;

    // archive transcript

    const history = document.getElementById("history");

    const entry = document.createElement("div");

    entry.className = "oracle-entry";

    entry.innerText = oracleText;

    // newest at top

    history.prepend(entry);

// initial render

updateOutput();

// regenerate every 20 seconds

setInterval(updateOutput, 20000);
}
</script>
</body>
</html>
