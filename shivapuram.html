<script>

let subjects = [
    { en: "Memory", jp: "kioku", cn: "记忆" },
    { en: "Dream", jp: "yume", cn: "梦" },
    { en: "Identity", jp: "jiko", cn: "身份" },
    { en: "Language", jp: "kotoba", cn: "语言" },
    { en: "Consciousness", jp: "ishiki", cn: "意识" }
];

const verbs = [
    { en: "constructs", jp: "tsukuru", cn: "构建" },
    { en: "fractures", jp: "kudaku", cn: "破碎" },
    { en: "echoes", jp: "hibiku", cn: "回响" },
    { en: "translates", jp: "hon'yaku suru", cn: "翻译" },
    { en: "rebuilds", jp: "saikōsei suru", cn: "重建" }
];

const objects = [
    { en: "meaning", jp: "imi", cn: "意义" },
    { en: "possibility", jp: "kanōsei", cn: "可能性" },
    { en: "truth", jp: "shinjitsu", cn: "真相" },
    { en: "emotion", jp: "kanjō", cn: "情感" },
    { en: "syntax", jp: "bunpō", cn: "句法" }
];

const modifiers = [
    "through abstraction",
    "inside recursion",
    "across timelines",
    "beyond language",
    "within emergence"
];

function random(arr){
    return arr[Math.floor(Math.random() * arr.length)];
}

// Hidden multilingual drift simulation
function semanticDrift(subject, verb, object){

    const driftMap = {
        "记忆": "memory",
        "梦": "dream",
        "身份": "identity",
        "语言": "language",
        "意识": "consciousness",

        "意义": "meaning",
        "可能性": "possibility",
        "真相": "truth",
        "情感": "emotion",
        "句法": "syntax"
    };

    // simulate English → Japanese → Chinese → English
    let evolvedSubject = driftMap[subject.cn] || subject.en;
    let evolvedObject = driftMap[object.cn] || object.en;

    return {
        subject: evolvedSubject,
        verb: verb.en,
        object: evolvedObject
    };
}

// Recursive memory injection
function recursiveFeed(object){
    subjects.push({
        en: object.en,
        jp: object.jp,
        cn: object.cn
    });

    if(subjects.length > 15){
        subjects.shift();
    }
}

function generateThought(){

    const subject = random(subjects);
    const verb = random(verbs);
    const object = random(objects);
    const modifier = random(modifiers);

    const drifted = semanticDrift(subject, verb, object);

    recursiveFeed(object);

    return `${drifted.subject} ${drifted.verb} ${drifted.object} ${modifier}.`;
}

function updateOutput(){
    document.getElementById("output").innerText = generateThought();
}

// initial sentence
updateOutput();

// regenerate every 20 seconds
setInterval(updateOutput, 20000);

</script>
