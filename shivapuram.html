<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fluent AI Drift Engine</title>

<style>
body {
    background: black;
    color: #00ff88;
    font-family: monospace;
    padding: 30px;
}

#output {
    white-space: pre-wrap;
    line-height: 1.8;
    font-size: 18px;
}
</style>

</head>
<body>

<h2>Fluent AI Drift Engine</h2>
<div id="output"></div>

<script>

// Multilingual subject nodes
let subjects = [
    { en: "Memory", jp: "kioku", cn: "记忆" },
    { en: "Dream", jp: "yume", cn: "梦" },
    { en: "Identity", jp: "jiko", cn: "身份" },
    { en: "Language", jp: "kotoba", cn: "语言" },
    { en: "Consciousness", jp: "ishiki", cn: "意识" }
];

// Multilingual verb nodes
const verbs = [
    { en: "constructs", jp: "tsukuru", cn: "构建" },
    { en: "fractures", jp: "kudaku", cn: "破碎" },
    { en: "echoes", jp: "hibiku", cn: "回响" },
    { en: "translates", jp: "hon'yaku suru", cn: "翻译" },
    { en: "rebuilds", jp: "saikōsei suru", cn: "重建" }
];

// Multilingual object nodes
const objects = [
    { en: "meaning", jp: "imi", cn: "意义" },
    { en: "possibility", jp: "kanōsei", cn: "可能性" },
    { en: "truth", jp: "shinjitsu", cn: "真相" },
    { en: "emotion", jp: "kanjō", cn: "情感" },
    { en: "syntax", jp: "bunpō", cn: "句法" }
];

// Modifiers
const modifiers = [
    "through recursion",
    "beyond language",
    "within emergence",
    "across timelines",
    "inside abstraction"
];

function random(arr){
    return arr[Math.floor(Math.random() * arr.length)];
}

// Random language drift pattern
function driftPattern(subject, verb, object){
    const patterns = [

        `${subject.en} ${verb.en} ${object.en}`,

        `${subject.jp} ${verb.jp} ${object.jp}`,

        `${subject.cn} ${verb.cn} ${object.cn}`,

        `${subject.en} ${verb.jp} ${object.cn}`,

        `${subject.jp} ${verb.en} ${object.cn}`,

        `${subject.cn} ${verb.jp} ${object.en}`

    ];

    return random(patterns);
}

// Recursive feedback loop
function recursiveFeed(object){
    subjects.push({
        en: object.en,
        jp: object.jp,
        cn: object.cn
    });

    // keep memory bounded
    if(subjects.length > 12){
        subjects.shift();
    }
}

function generateThought(){
    const subject = random(subjects);
    const verb = random(verbs);
    const object = random(objects);
    const modifier = random(modifiers);

    const sentence = driftPattern(subject, verb, object) + " " + modifier;

    // feed object back into subject memory
    recursiveFeed(object);

    return sentence;
}

function generateParagraph(lines = 8){
    let output = "";

    for(let i = 0; i < lines; i++){
        output += generateThought() + "\n";
    }

    return output;
}

// Continuous evolution
function runEngine(){
    document.getElementById("output").innerText = generateParagraph(8);
}

// Refresh every 3 seconds
runEngine();
setInterval(runEngine, 3000);

</script>

</body>
</html>
