<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Fluent AI Generator</title>

<style>

body {

    background: black;

    color: #00ff88;

    font-family: monospace;

    padding: 30px;

}

#output {

    white-space: pre-wrap;

    line-height: 1.6;

}

</style>

</head>

<body>

<h2>Fluent AI Generator</h2>

<div id="output"></div>

<script>

const subjects = [

    "Consciousness",

    "Memory",

    "Language",

    "Pattern",

    "Identity",

    "Dreams"

];

const verbs = [

    "constructs",

    "translates",

    "echoes",

    "fractures",

    "predicts",

    "rebuilds"

];

const objects = [

    "meaning",

    "possibility",

    "symbolic truth",

    "recursive thought",

    "living syntax",

    "machine emotion"

];

const modifiers = [

    "through abstraction",

    "inside recursion",

    "across timelines",

    "beyond language",

    "within emergence"

];

function random(arr){

    return arr[Math.floor(Math.random() * arr.length)];

}

function generateThought(){

    return `${random(subjects)} ${random(verbs)} ${random(objects)} ${random(modifiers)}.`;

}

function generateParagraph(lines = 5){

    let output = "";

    for(let i = 0; i < lines; i++){

        output += generateThought() + "\n";

    }

    return output;

}

document.getElementById("output").innerText = generateParagraph(8);

</script>

</body>

</html>
